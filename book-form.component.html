<h2>{{ isEditing ? '✏️ Edit Book' : '📖 Add New Book' }}</h2>

<form [formGroup]="bookForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
        <label for="title">Book Title *</label>
        <input 
            type="text" 
            id="title" 
            formControlName="title" 
            placeholder="Enter book title (e.g., The Great Gatsby)"
            [class.invalid]="titleControl?.invalid && titleControl?.touched">
        <div class="error-message" *ngIf="titleControl?.invalid && titleControl?.touched">
            <span *ngIf="titleControl?.errors?.['required']">Title is required</span>
            <span *ngIf="titleControl?.errors?.['minlength']">Title must be at least 2 characters</span>
        </div>
    </div>

    <div class="form-group">
        <label for="author">Author *</label>
        <input 
            type="text" 
            id="author" 
            formControlName="author" 
            placeholder="Enter author name (e.g., F. Scott Fitzgerald)"
            [class.invalid]="authorControl?.invalid && authorControl?.touched">
        <div class="error-message" *ngIf="authorControl?.invalid && authorControl?.touched">
            <span *ngIf="authorControl?.errors?.['required']">Author is required</span>
            <span *ngIf="authorControl?.errors?.['minlength']">Author must be at least 2 characters</span>
        </div>
    </div>

    <div class="form-group">
        <label for="isbn">ISBN *</label>
        <input 
            type="text" 
            id="isbn" 
            formControlName="isbn" 
            placeholder="Enter ISBN (e.g., 978-0743273565)"
            [class.invalid]="isbnControl?.invalid && isbnControl?.touched">
        <div class="error-message" *ngIf="isbnControl?.invalid && isbnControl?.touched">
            <span *ngIf="isbnControl?.errors?.['required']">ISBN is required</span>
            <span *ngIf="isbnControl?.errors?.['pattern']">ISBN should contain only numbers and hyphens</span>
        </div>
    </div>

    <div class="form-group">
        <label for="publicationDate">Publication Date *</label>
        <input 
            type="date" 
            id="publicationDate" 
            formControlName="publicationDate"
            [class.invalid]="publicationDateControl?.invalid && publicationDateControl?.touched">
        <div class="error-message" *ngIf="publicationDateControl?.invalid && publicationDateControl?.touched">
            Publication date is required
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" [disabled]="bookForm.invalid" class="btn-save">
            {{ isEditing ? 'Update Book' : 'Save Book' }}
        </button>
        <button type="button" (click)="onCancel()" class="btn-cancel">Cancel</button>
    </div>

    <div class="form-note" *ngIf="bookForm.invalid">
        * Please fill all required fields correctly
    </div>
</form>
